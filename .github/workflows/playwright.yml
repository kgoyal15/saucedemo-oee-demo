name: Playwright Tests — Saucedemo OEE Demo

on:
  # Manual trigger from GitHub UI — choose user type per chapter
  workflow_dispatch:
    inputs:
      user_type:
        description: |
          Chapter 1 → problem   (~45% failures, clusters form)
          Chapter 2 → glitch    (flaky timeouts, reliability degrades)
          Chapter 3 → standard  (all pass, reliability recovers)
        required: true
        default: 'problem'
        type: choice
        options:
          - problem
          - glitch
          - standard

  # Auto-trigger on push to main (defaults to problem for first-run demos)
  push:
    branches: [main]

jobs:
  playwright:
    name: Run Playwright (${{ github.event.inputs.user_type || 'problem' }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          TEST_USER: ${{ github.event.inputs.user_type || 'problem' }}
        run: npx playwright test

      # Upload artifact named exactly "playwright-report" — OEE backend looks for this name
      - name: Upload Playwright report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: warn
